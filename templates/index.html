<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human in the Loop</title>
    <link href="{{ url_for('static', filename='images/INCODE_icon.png') }}" rel="icon" type="image/png">
    <link href=" {{url_for('static', filename = 'css/styles.css')}}" rel ='stylesheet'/>

</head>
<body>
    <div class="header">
        <img src="{{ url_for('static', filename='images/INCODE_logo.png') }}" alt="INCODE Logo" class="logo" >
        <h1>Human in the Loop</h1>
        <div class="logos">
            <img src="{{ url_for('static', filename='images/polimi_logo.png') }}" alt="Politecnico di Milano Logo" class="logo">
            <img src="{{ url_for('static', filename='images/made_logo.png') }}" alt="MADE Competence Center Logo" class="logo">
        </div>
    </div>
    <div class="container">
        <div class="main">
            <h1> Trial name</h1>
            <form action = "/setup">
                <input type="text" name="trial_name" id="trial_name" placeholder="Enter trial name" />
                <button class="button1" type = "submit">Start Trial </button>
            </form>
        </div>
        <div class="main">
            <h1>Historical Trial Data</h1>
            <form action = "/historypage">
                <button class="button2" type = "submit">View trial history </button>
            </form>
        </div>
    </div>
</body>
</html>
